services:
  # Optional: PostgreSQL Database (use Supabase instead)
  # - type: pserv
  #   name: healthcare-postgres
  #   env: docker
  #   plan: standard
  #   dockerfilePath: ./Dockerfile
  #   region: ohio
  #   envVars:
  #     - key: POSTGRES_DB
  #       value: healthcare_db
  #     - key: POSTGRES_USER
  #       value: healthcare_user
  #     - key: POSTGRES_PASSWORD
  #       generateValue: true
  #   persistentDisk:
  #     name: postgres_data
  #     mountPath: /var/lib/postgresql/data
  #     sizeGB: 10

  # Redis Cache
  - type: redis
    name: healthcare-redis
    region: ohio
    plan: free
    ipAllowList: []

  # React Frontend
  - type: web
    name: healthcare-frontend
    env: docker
    plan: standard
    region: ohio
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        value: 'https://healthcare-backend.onrender.com/api'
    serviceIdleTimeoutMinutes: 15
    maxShutdownDelaySeconds: 30
    routes:
      - type: http
        path: /

  # Django Backend
  - type: web
    name: healthcare-backend
    env: python
    plan: standard
    region: ohio
    buildCommand: |
      cd backend && \
      pip install --no-cache-dir -r requirements.txt && \
      python manage.py collectstatic --noinput && \
      python manage.py migrate
    startCommand: >
      cd backend && \
      gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: 'healthcare-backend.onrender.com,.onrender.com'
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        value: ''  # SET THIS: postgresql://user:password@host:5432/database
      - key: REDIS_URL
        fromService:
          type: redis
          name: healthcare-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}/1
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}/2
      - key: CORS_ALLOWED_ORIGINS
        value: 'https://healthcare-frontend.onrender.com,https://healthcare-backend.onrender.com'
    serviceIdleTimeoutMinutes: 15
    maxShutdownDelaySeconds: 30
    routes:
      - type: http
        path: /

  # Celery Worker
  - type: background_worker
    name: healthcare-celery-worker
    env: python
    plan: standard
    region: ohio
    buildCommand: |
      cd backend && \
      pip install --no-cache-dir -r requirements.txt
    startCommand: >
      cd backend && \
      celery -A config worker --loglevel=info --concurrency=4
    envVars:
      - key: SUPABASE_URL
        value: ''  # SET THIS: postgresql://user:password@host:5432/database
      - key: REDIS_URL
        fromService:
          type: redis
          name: healthcare-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}/1
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}/2

  # Celery Beat (Scheduler)
  - type: background_worker
    name: healthcare-celery-beat
    env: python
    plan: standard
    region: ohio
    buildCommand: |
      cd backend && \
      pip install --no-cache-dir -r requirements.txt
    startCommand: >
      cd backend && \
      celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: SUPABASE_URL
        value: ''  # SET THIS: postgresql://user:password@host:5432/database
      - key: REDIS_URL
        fromService:
          type: redis
          name: healthcare-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        value: ${REDIS_URL}/1
      - key: CELERY_RESULT_BACKEND
        value: ${REDIS_URL}/2
